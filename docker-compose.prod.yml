services:
  # Backend - FastAPI + Static ML Model
  backend:
    image: amarpoji/phishing-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: phishing_backend
    # We no longer mount mlruns or mlflow_artifacts, we only use the local model
    command: uvicorn backend.src.app:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - phishing_network

  # Frontend - Streamlit
  frontend:
    image: amarpoji/phishing-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: phishing_frontend
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - phishing_network
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0

  nginx:
    image: nginx:latest
    container_name: phishing_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - phishing_network

networks:
  phishing_network:
    driver: bridge
