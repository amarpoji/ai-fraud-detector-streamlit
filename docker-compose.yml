services:
  # Backend - FastAPI + ML Model
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: phishing_backend
    volumes:
          - ./backend:/app/backend
          - ./mlruns:/app/mlruns
          - ./mlflow_artifacts:/app/mlflow_artifacts
    command: uvicorn backend.src.app:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - phishing_network

  # Frontend - Streamlit
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: phishing_frontend
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - phishing_network
    command : streamlit run app.py --server.port=8501 --server.address=0.0.0.0

  # Optional: MLflow UI for monitoring
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: phishing_mlflow
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlflow_artifacts:/mlflow/mlflow_artifacts
    command: mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    networks:
      - phishing_network
    environment:
      - MLFLOW_TRACKING_URI=sqlite:////app/mlflow_artifacts/mlflow.db
  
  nginx:
    image: nginx:latest
    container_name: phishing_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - phishing_network

networks:
  phishing_network:
    driver: bridge

volumes:
  backend_data:
  mlflow_data:
