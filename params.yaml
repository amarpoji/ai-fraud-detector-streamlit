data:
  raw_path: backend/data/raw/email_dataset.csv
  processed_path: backend/data/processed/email_dataset_processed.csv



preprocessing:
  train_test_split: 0.2
  random_state: 42
  # Experiment with different TF-IDF configurations
  tfidf_variants:
    tfidf_v1:
      max_features: 5000
      ngram_range: [1, 2]
      min_df: 2
      max_df: 0.95
    tfidf_v2:
      max_features: 3000
      ngram_range: [1, 3]
      min_df: 1
      max_df: 0.9
    tfidf_v3:
      max_features: 10000
      ngram_range: [1, 2]
      min_df: 1
      max_df: 0.95

cross_validation:
  enabled: true
  n_splits: 5
  strategy: stratified  # Handles imbalanced data better
  random_state: 42

model_variants:
  RandomForest_v1:
    type: RandomForest
    n_estimators: 100
    max_depth: 15
    min_samples_split: 5
    min_samples_leaf: 2
    random_state: 42
    n_jobs: -1
    criterion: gini
  
  RandomForest_v2:
    type: RandomForest
    n_estimators: 200
    max_depth: 20
    min_samples_split: 3
    min_samples_leaf: 1
    random_state: 42
    n_jobs: -1
  
  LogisticRegression_v1:
    type: LogisticRegression
    C: 1.0
    solver: lbfgs
    max_iter: 1000
    random_state: 42
  
  LogisticRegression_v2:
    type: LogisticRegression
    C: 0.1
    solver: liblinear
    max_iter: 1000
    random_state: 42
  
  NaiveBayes_v1:
    type: NaiveBayes
    alpha: 1.0

mlflow:
  experiment_name: email-phishing-detection
  run_name_prefix: phishing-detector
  track_model_signature: true
  register_model: true
  model_registry_name: fraud-detector-model
  track_important_metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - roc_auc
    - training_time

mlflow_ui:
  use_dagshub: true
  repo_owner: "amarpoji"
  repo_name: "ai-fraud-detector-streamlit"
  experiment_name: "email-phishing-detection"
  run_name_prefix: "phishing-detector"
  track_model_signature: true
  register_model: true
  model_registry_name: "fraud-detector-model"

