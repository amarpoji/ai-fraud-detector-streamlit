          LogisticRegression_v2:
            type: LogisticRegression
            C: 0.1
            solver: liblinear
            max_iter: 1000
            random_state: 42
          NaiveBayes_v1:
            type: NaiveBayes
            alpha: 1.0
        preprocessing:
          train_test_split: 0.2
          random_state: 42
          tfidf_variants:
